<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Visualization of a 1D CNN for Spoken Digits (AudioMNIST)</title>
    <link href='https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700' rel='stylesheet' type='text/css'>
    <style>
      body { margin: 0; background: #2b2f33; color: #ddd;
             font-family: 'Source Sans Pro', Arial, sans-serif; overflow: hidden; }
      #webgl_container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
      .panel { position: absolute; z-index: 10; background: rgba(20,20,20,0.85); border: 1px solid #333;
               border-radius: 6px; padding: 12px 14px; font-size: 14px; }
      #inputPanel { left: 12px; bottom: 12px; width: 320px; }
      #layerPanel { right: 12px; top: 12px; width: 220px; }
      #infobox { left: 12px; top: 12px; width: 260px; visibility: hidden; }
      #infobox .nt { font-weight: bold; color: #6cf; margin-bottom: 6px; }
      #infobox .row { color: #bbb; font-size: 13px; }
      #infobox .row b { color: #eee; }
      #infobox .flabel { color: #888; font-size: 12px; margin: 8px 0 4px; }
      #filterCanvas { width: 100%; height: 64px; background: #0a0a0a; border: 1px solid #333;
                      border-radius: 4px; display: block; }
      h3 { margin: 0 0 8px; font-weight: normal; color: #6cf; font-size: 15px; }
      button { background: #2a6; color: #fff; border: none; border-radius: 4px;
               padding: 7px 12px; cursor: pointer; font-size: 14px; }
      button:hover { background: #3c8; }
      select { width: 100%; padding: 5px; margin-top: 8px; background: #111; color: #ddd;
               border: 1px solid #444; border-radius: 4px; }
      #waveCanvas { width: 100%; height: 70px; background: #0a0a0a; border: 1px solid #333;
                    border-radius: 4px; margin-top: 10px; display: block; }
      .guess { margin-top: 8px; }
      .guess b { color: #6f6; font-size: 20px; }
      .layerRow { display: flex; justify-content: space-between; align-items: center;
                  padding: 3px 0; border-bottom: 1px solid #222; }
      .layerRow label { font-size: 13px; }
      .hint { color: #888; font-size: 12px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div id="webgl_container"></div>

    <div id="infobox" class="panel">
      <div class="nt" id="nt"></div>
      <div class="row">Activation: <b id="nodeRaw"></b> <span id="nodeNorm" style="color:#888"></span></div>
      <div id="filterWrap">
        <div class="flabel" id="flabel">Learned filter (1D kernel):</div>
        <canvas id="filterCanvas" width="232" height="64"></canvas>
      </div>
    </div>

    <div id="inputPanel" class="panel">
      <h3>Speech input (AudioMNIST)</h3>
      <button id="randomBtn">&#127922; Random sample</button>
      <select id="sampleSelect"></select>
      <canvas id="waveCanvas" width="300" height="70"></canvas>
      <audio id="player" controls style="width:100%; margin-top:8px;"></audio>
      <div class="guess">True label: <b id="trueLabel">&ndash;</b></div>
      <div class="guess">Prediction: <b id="guess1">&ndash;</b>
        <span id="guess2" style="color:#999; font-size:14px;"></span></div>
      <div class="hint">Hover network nodes to inspect activations and connections.</div>
    </div>

    <div id="layerPanel" class="panel">
      <h3>Layer visibility</h3>
      <div id="layerToggles"></div>
    </div>

    <div id="loading" class="panel" style="left:50%; top:50%; transform:translate(-50%,-50%);">
      Loading model&hellip;
    </div>

    <script src="../js/three.min.js"></script>
    <script src="../js/myOrbitControls.js"></script>
    <script src="../js/stats.min.js"></script>
    <script src="../js/jquery-1.11.2.min.js"></script>
    <script src="../js/colormaps/myColorMap_dark.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="../js/nn/infer.js"></script>
    <script src="../js/nn/viz.js"></script>

    <script>
      var LAYOUT, SAMPLES, INPUT_LEN, SAMPLE_RATE;
      var currentWave = null, gradcamOn = false;

      async function boot() {
        LAYOUT = await fetch('../js/nn/layout.json').then(function (r) { return r.json(); });
        var sj = await fetch('../js/nn/samples.json').then(function (r) { return r.json(); });
        SAMPLES = sj.samples; INPUT_LEN = LAYOUT.inputLen; SAMPLE_RATE = LAYOUT.sampleRate;

        Viz.init(LAYOUT, document.getElementById('webgl_container'));
        Viz.setHoverCallback(showInfo);
        buildLayerToggles();
        buildSampleOptions();

        await Infer.load('../js/nn/tfjs_model/model.json', LAYOUT.layers);
        document.getElementById('loading').style.display = 'none';
        selectSample(0);
      }

      function buildLayerToggles() {
        var box = document.getElementById('layerToggles');
        LAYOUT.layers.forEach(function (l) {
          var row = document.createElement('div'); row.className = 'layerRow';
          var lbl = document.createElement('label'); lbl.textContent = l.label;
          var cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = true;
          cb.addEventListener('change', function () { Viz.setLayerHidden(l.name, !cb.checked); });
          row.appendChild(lbl); row.appendChild(cb); box.appendChild(row);
        });
      }

      function buildSampleOptions() {
        var sel = document.getElementById('sampleSelect');
        SAMPLES.forEach(function (s, i) {
          var o = document.createElement('option');
          o.value = i; o.textContent = 'Sample ' + (i + 1) + '  (spoken "' + s.label + '")';
          sel.appendChild(o);
        });
        sel.addEventListener('change', function () { selectSample(parseInt(sel.value, 10)); });
        document.getElementById('randomBtn').addEventListener('click', function () {
          var i = Math.floor(Math.random() * SAMPLES.length);
          sel.value = i; selectSample(i);
        });
      }

      function selectSample(i) {
        var s = SAMPLES[i];
        var wave = Float32Array.from(s.waveform);
        currentWave = wave;
        gradcamOn = false; Viz.clearGradcam();
        Viz.setWaveform(wave);
        drawWave(wave);
        document.getElementById('player').src = 'data:audio/wav;base64,' + s.wav;
        document.getElementById('trueLabel').textContent = s.label;

        var res = Infer.run(wave, INPUT_LEN);
        Viz.setActivations(res.perLayer);
        showPrediction(res.probs);
      }

      function showPrediction(probs) {
        var order = Array.from(probs.keys()).sort(function (a, b) { return probs[b] - probs[a]; });
        document.getElementById('guess1').textContent =
          order[0] + '  (' + (probs[order[0]] * 100).toFixed(1) + '%)';
        document.getElementById('guess2').textContent =
          '· 2nd: ' + order[1] + ' (' + (probs[order[1]] * 100).toFixed(1) + '%)';
      }

      function drawWave(wave) {
        var cv = document.getElementById('waveCanvas');
        var ctx = cv.getContext('2d');
        var W = cv.width, H = cv.height, mid = H / 2;
        ctx.clearRect(0, 0, W, H);
        if (gradcamOn) {  // Grad-CAM importance projected onto the input time axis
          for (var gx = 0; gx < W; gx++) {
            var col = Viz.jet(Viz.camAt(gx / (W - 1)));
            ctx.fillStyle = 'rgba(' + Math.round(col[0]*255) + ',' + Math.round(col[1]*255) +
                            ',' + Math.round(col[2]*255) + ',0.55)';
            ctx.fillRect(gx, 0, 1, H);
          }
        }
        ctx.strokeStyle = '#333'; ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();
        ctx.strokeStyle = gradcamOn ? '#fff' : '#3c8'; ctx.beginPath();
        var step = wave.length / W;
        for (var x = 0; x < W; x++) {
          var v = wave[Math.floor(x * step)] || 0;
          var y = mid - v * mid * 0.95;
          if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      function showInfo(d) {
        var box = document.getElementById('infobox');

        // Grad-CAM mode: hovering an output node highlights the input regions
        // most responsible for that class, via the last conv layer.
        var isOutput = d && d.type === 'dense' && d.name === 'output';
        if (gradcamOn && !isOutput) { gradcamOn = false; Viz.clearGradcam(); if (currentWave) drawWave(currentWave); }
        if (isOutput && currentWave) {
          var cls = d.t;
          var cam = Infer.gradcam(cls, currentWave, INPUT_LEN);
          Viz.showGradcam(cam); gradcamOn = true;
          drawWave(currentWave);
          box.style.visibility = 'visible';
          document.getElementById('nt').textContent = 'Grad-CAM → class ' + cls;
          document.getElementById('nodeRaw').textContent = 'score ' + d.raw.toFixed(3);
          document.getElementById('nodeNorm').textContent = '(red = most responsible input regions)';
          document.getElementById('filterWrap').style.display = 'none';
          return;
        }

        if (!d) { box.style.visibility = 'hidden'; return; }
        box.style.visibility = 'visible';
        var nt = d.layer;
        if (d.type === 'conv' || d.type === 'pool')
          nt += ' — time ' + d.t + ', channel ' + (d.c + 1) + '/' + d.channels;
        else if (d.type === 'dense') nt += ' — unit ' + (d.t + 1);
        document.getElementById('nt').textContent = nt;
        document.getElementById('nodeRaw').textContent = d.raw.toFixed(4);
        document.getElementById('nodeNorm').textContent = '(' + d.norm.toFixed(2) + ' normalized)';

        var wrap = document.getElementById('filterWrap');
        if (d.type === 'conv') {
          var f = Infer.getFilter(d.name, d.c);
          if (f) {
            wrap.style.display = 'block';
            document.getElementById('flabel').textContent =
              'Learned filter for channel ' + (d.c + 1) + ' (1D kernel, ' + f.length + ' taps):';
            drawFilter(f);
          } else { wrap.style.display = 'none'; }
        } else {
          wrap.style.display = 'none';
        }
      }

      function drawFilter(f) {
        var cv = document.getElementById('filterCanvas');
        var ctx = cv.getContext('2d');
        var W = cv.width, H = cv.height, mid = H / 2;
        ctx.clearRect(0, 0, W, H);
        ctx.strokeStyle = '#333'; ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();
        var mx = 1e-6;
        for (var i = 0; i < f.length; i++) mx = Math.max(mx, Math.abs(f[i]));
        var bw = W / f.length;
        for (var k = 0; k < f.length; k++) {
          var v = f[k] / mx;            // -1..1
          var h = v * (mid - 2);
          ctx.fillStyle = v >= 0 ? '#4cd' : '#c66';
          ctx.fillRect(k * bw, mid - Math.max(h, 0), Math.max(bw - 0.5, 1), Math.abs(h));
        }
        ctx.strokeStyle = '#6cf'; ctx.lineWidth = 1; ctx.beginPath();
        for (var j = 0; j < f.length; j++) {
          var y = mid - (f[j] / mx) * (mid - 2);
          if (j === 0) ctx.moveTo(j * bw, y); else ctx.lineTo(j * bw, y);
        }
        ctx.stroke();
      }

      boot().catch(function (e) {
        document.getElementById('loading').innerHTML =
          'Failed to load. Run the model pipeline first (model/start.sh).<br><br>' +
          '<span style="color:#888">' + e + '</span>';
        console.error(e);
      });
    </script>
  </body>
</html>
