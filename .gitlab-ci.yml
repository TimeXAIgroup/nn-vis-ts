# GitLab Pages deploy for the static demo.
# No build step — the site is plain HTML/JS plus the generated assets in js/nn/.
# The `pages` job just assembles the public/ directory that GitLab Pages serves.
pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp -r index.html cnn css js images public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
